<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width">
    <link href="style.css" rel="stylesheet" type="text/css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Jura:wght@300..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Rubik+80s+Fade&display=swap" rel="stylesheet">

  </head>

  <body>
    <!-- header row with logo -->
    <div class="header">
        <img id="tentacles" src="assets/tentacles.png">
        <h1 class="header-text">Sea Monster Crowdfunding</h1>
    </div>

    <!-- background info about company -->
    <div class="bg-info">
        <h2>Welcome to <div class="bg-headline"> Sea Monster!</div></h2>
        <div id="description-container">
            <p>The purpose of our company is to fund independent games. We've been in operation for 12 years.</p>
        </div>
    </div>

    <!-- top games & other interesting stats -->
    <div class="stats-div">
        <h2>Stats</h2>
        <div class="stats-container">
            <div class="stats-card">
                <h3>Individual Contributions</h3>
                <p id="num-contributions">
                </p>
            </div>
            <div class="stats-card">
                <h3>Total Raised</h3>
                <p id="total-raised">
                </p>
            </div>
            <div class="stats-card">
                <h3>Total Number of Games</h3>
                <p id="num-games">
                </p>
            </div>
        </div>
    </div>


    <div class="stats-container" id="top-games">
        <div class="stats-card" id="first-game">
            <h3>🥇 Top Funded Game</h3>
        </div>
        <div class="stats-card" id="second-game">
            <h3>🥈 Runner Up</h3>
        </div>
    </div>

    <div class="space-div">

    </div>

    <!-- list of games funded by Sea Monster -->
    <div class="games-heading">
        <h2>Our Games</h2>
        <p>Check out each of our games below!</p>
    </div>
    
    <div id="button-container">
        <button id="unfunded-btn">Show Unfunded Only</button>
        <button id="funded-btn">Show Funded Only</button>
        <button id="all-btn">Show All Games</button>
    </div>

    <div id="games-container">

    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
